<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>행운 번호 추첨기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="container">
    <h1>✨ 행운 번호 추첨기</h1>
    <p class="subtitle">1~45 사이의 숫자 6개를 무작위로 뽑아드립니다</p>

    <div class="machine">
      <div class="drum" id="drum">
        <div class="drum-balls">
          <span class="mini-ball b1"></span>
          <span class="mini-ball b2"></span>
          <span class="mini-ball b3"></span>
          <span class="mini-ball b4"></span>
          <span class="mini-ball b5"></span>
        </div>
        <div class="drum-shine"></div>
      </div>
      <div class="drum-status" id="drumStatus">🎱</div>
    </div>

    <div class="controls">
      <label for="count">게임 수:</label>
      <input type="number" id="count" value="1" min="1" max="10" />
    </div>

    <button id="generateBtn" onclick="generateLotto()">🎲 번호 추첨!</button>

    <div id="results"></div>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
